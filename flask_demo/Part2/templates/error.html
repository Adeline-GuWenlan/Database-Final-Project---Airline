{% extends "base.html" %}

{% block title %}{{ title or "Error" }}{% endblock %}

{% block content %}
<section class="hero">
    <span class="eyebrow">Error</span>
    <h1>{{ title or "Something went wrong." }}</h1>
    <p>{{ error }}</p>
    <div class="actions">
        <a class="button" href="{{ url_for('index') }}">Return Home</a>
        <a class="button secondary" href="{{ url_for('flights') }}">Search Flights</a>
    </div>
</section>
{% endblock %}
